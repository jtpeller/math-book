<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="100%" height="100%" fill="white" />

    <!-- Title -->
    <text x="300" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
        fill="#333">
        Parallelism vs. Antiparallelism
    </text>

    <!-- Definitions for Arrowheads -->
    <defs>
        <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 6 3.5, 0 6" fill="#dc2626" />
        </marker>
        <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 6 3.5, 0 6" fill="#2563eb" />
        </marker>
    </defs>

    <!-- ================= PARALLEL SECTION ================= -->
    <g transform="translate(50, 80)">
        <text x="100" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
            fill="#2563eb">Parallel</text>
        <text x="100" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">(Same
            Direction)</text>

        <!-- Vector A -->
        <line x1="20" y1="50" x2="120" y2="50" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowhead-blue)" />
        <text x="70" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
            fill="#2563eb">A</text>

        <!-- Vector B (Parallel to A) -->
        <line x1="20" y1="90" x2="120" y2="90" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowhead-blue)" />
        <text x="70" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
            fill="#2563eb">B</text>

        <!-- Math Notation -->
        <text x="70" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">A ∥
            B</text>
        <text x="70" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Angle =
            0°</text>
    </g>

    <!-- ================= ANTIPARALLEL SECTION ================= -->
    <g transform="translate(350, 80)">
        <text x="100" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
            fill="#dc2626">Antiparallel</text>
        <text x="100" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">(Opposite
            Direction)</text>

        <!-- Vector C -->
        <line x1="20" y1="50" x2="120" y2="50" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowhead-red)" />
        <text x="70" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
            fill="#dc2626">C</text>

        <!-- Vector D (Antiparallel to C) -->
        <line x1="120" y1="90" x2="20" y2="90" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowhead-red)" />
        <text x="70" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
            fill="#dc2626">D</text>

        <!-- Math Notation -->
        <text x="70" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">C ⇋
            D</text>
        <text x="70" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Angle =
            180°</text>
    </g>

    <!-- Divider Line -->
    <line x1="270" y1="70" x2="270" y2="230" stroke="#ccc" stroke-width="2" stroke-dasharray="4,4" />
</svg>