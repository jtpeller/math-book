<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="100%" height="100%">
    <rect width="100%" height="100%" fill="#ffffff" />

    <defs>
        <style>
            .triangle {
                fill: #f0f4f8;
                stroke: #1e293b;
                stroke-width: 3;
                stroke-linejoin: round;
            }

            .right-angle {
                fill: none;
                stroke: #0f172a;
                stroke-width: 2;
            }

            .vertex {
                font-family: 'Segoe UI', system-ui, sans-serif;
                font-size: 22px;
                font-weight: bold;
                fill: #0f172a;
            }

            .side-length {
                font-family: 'Segoe UI', system-ui, sans-serif;
                font-size: 20px;
                font-style: italic;
                fill: #2563eb;
                font-weight: 600;
            }

            .side-desc {
                font-family: 'Segoe UI', system-ui, sans-serif;
                font-size: 14px;
                fill: #64748b;
                font-weight: 500;
            }

            .trig-label {
                font-family: 'Segoe UI', system-ui, sans-serif;
                font-size: 15px;
                fill: #dc2626;
                font-weight: 600;
            }

            .angle-theta {
                font-family: 'Segoe UI', system-ui, sans-serif;
                font-size: 18px;
                fill: #0f172a;
            }
        </style>
    </defs>

    <path d="M 150,320 L 180,320 L 180,350" class="right-angle" />

    <polygon points="150,100 450,350 150,350" class="triangle" />

    <path d="M 410,350 A 40,40 0 0 1 422,327" fill="none" stroke="#dc2626" stroke-width="2" />
    <text x="395" y="342" class="angle-theta">θ</text>

    <text x="135" y="90" class="vertex">A</text>
    <text x="465" y="365" class="vertex">B</text>
    <text x="125" y="365" class="vertex">C</text>

    <text x="300" y="380" text-anchor="middle" class="side-length">a</text>
    <text x="300" y="400" text-anchor="middle" class="side-desc">Leg</text>
    <text x="300" y="420" text-anchor="middle" class="trig-label">Adjacent (to θ)</text>

    <text x="110" y="230" text-anchor="end" class="side-length">b</text>
    <text x="110" y="250" text-anchor="end" class="side-desc">Leg</text>
    <text x="110" y="270" text-anchor="end" class="trig-label">Opposite (to θ)</text>

    <text x="315" y="205" class="side-length">c</text>
    <text x="325" y="225" class="side-desc">Hypotenuse</text>
</svg>