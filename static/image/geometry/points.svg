<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#f8fafc" />

    <!-- Point A -->
    <circle cx="100" cy="100" r="5" fill="#ff0000" />
    <text x="100" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold">A</text>

    <!-- Point B -->
    <circle cx="300" cy="100" r="5" fill="#19d600" />
    <text x="300" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold">B</text>

    <!-- Point C -->
    <circle cx="200" cy="220" r="5" fill="#0026ff" />
    <text x="200" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16"
        font-weight="bold">C</text>

    <!-- Optional: Faint grid to show they are on a plane (background context) -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#282e35" stroke-width="1" />
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" opacity="0.5" />
</svg>