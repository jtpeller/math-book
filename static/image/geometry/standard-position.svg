<svg width="500" height="350" viewBox="-120 -120 500 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Definitions for arrowheads -->
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
        </marker>
        <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 6 3.5, 0 6" fill="#dc2626" />
        </marker>
        <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 6 3.5, 0 6" fill="#2563eb" />
        </marker>
        <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 6 3.5, 0 7" fill="#16a34a" />
        </marker>
    </defs>

    <!-- Coordinate System Background -->
    <rect x="-150" y="-150" width="500" height="400" fill="white" />

    <!-- Axes -->
    <!-- X-Axis -->
    <line x1="-100" y1="150" x2="350" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="360" y="175" font-family="Arial, sans-serif" font-size="20" font-weight="bold">x</text>

    <!-- Y-Axis -->
    <line x1="125" y1="250" x2="125" y2="-50" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="130" y="-60" font-family="Arial, sans-serif" font-size="20" font-weight="bold">y</text>

    <!-- Origin Label -->
    <text x="115" y="170" font-family="Arial, sans-serif" font-size="14" fill="#333">O (0,0)</text>

    <!-- Angle in Standard Position (Example: 120 degrees) -->
    <!-- Vertex at (125, 150) which is the origin in this coordinate system -->

    <!-- 1. Initial Side (Positive x-axis) -->
    <!-- Drawn from origin to the right -->
    <line x1="125" y1="150" x2="300" y2="150" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowhead-red)"/>
    <text x="260" y="140" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc2626">Initial
        Side</text>

    <!-- 2. Terminal Side (Rotated ray) -->
    <!-- Drawn from origin to approx 120 degrees (cos 120 = -0.5, sin 120 = 0.866) -->
    <!-- Length 120 units roughly -->
    <line x1="125" y1="150" x2="65" y2="46" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowhead-green)" />
    <text x="30" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#16a34a">Terminal
        Side</text>

    <!-- 3. Rotation Arrow (Arc) -->
    <!-- Starts at initial side, curves counter-clockwise to terminal side -->
    <!-- Using a path for the arc -->
    <path d="M 175 150 A 50 50 0 0 0 110 100" fill="none" stroke="#2563eb" stroke-width="2"
        marker-end="url(#arrowhead-blue)" stroke-dasharray="4,2" />

    <!-- Angle Label -->
    <text x="140" y="135" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2563eb">θ</text>

    <!-- Quadrant Label -->
    <text x="200" y="100" font-family="Arial, sans-serif" font-size="12" fill="#999">Quadrant II</text>
</svg>