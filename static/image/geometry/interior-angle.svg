<svg width="550" height="475" viewBox="40 0 550 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="100%" height="100%" fill="white" />

    <!-- Title -->
    <text x="325" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
        fill="#333">
        Interior vs. Exterior Angles
    </text>

    <!-- Triangle Vertices -->
    <!-- A (top), B (bottom left), C (bottom right) -->
    <polygon points="250,80 100,300 400,300" fill="none" stroke="#333" stroke-width="2" />

    <!-- Extension of side BC to the right -->
    <line x1="400" y1="300" x2="480" y2="300" stroke="#333" stroke-width="2" stroke-dasharray="4,4" />
    <text x="485" y="305" font-family="Arial, sans-serif" font-size="14" fill="#555">Extended Side</text>

    <!-- Labels for Vertices -->
    <text x="250" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold">A</text>
    <text x="90" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold">B</text>
    <text x="410" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="20"
        font-weight="bold">C</text>

    <!-- INTERIOR ANGLES -->
    <!-- Angle at A -->
    <path d="M 235 100 A 20 20 0 0 0 265 100" fill="none" stroke="#2563eb" stroke-width="2" />
    <text x="245" y="120" font-family="Arial, sans-serif" font-size="14" fill="#2563eb" font-weight="bold">α</text>

    <!-- Angle at B -->
    <path d="M 130 300 A 30 30 0 0 0 115 280" fill="none" stroke="#2563eb" stroke-width="2" />
    <text x="130" y="290" font-family="Arial, sans-serif" font-size="14" fill="#2563eb" font-weight="bold">β</text>

    <!-- Angle at C (Interior) -->
    <path d="M 370 300 A 30 30 0 0 1 385 280" fill="none" stroke="#2563eb" stroke-width="2" />
    <text x="360" y="290" font-family="Arial, sans-serif" font-size="14" fill="#2563eb" font-weight="bold">γ</text>

    <text x="250" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2563eb"
        font-style="italic">Interior Angles (Inside)</text>

    <!-- EXTERIOR ANGLE -->
    <!-- Angle at C (Exterior) - between side AC and extended line BC -->
    <path d="M 387 280 A 30 30 0 0 1 420 300" fill="none" stroke="#dc2626" stroke-width="2" />
    <text x="420" y="285" font-family="Arial, sans-serif" font-size="16" fill="#dc2626" font-weight="bold">δ</text>

    <text x="440" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#dc2626"
        font-style="italic">Exterior Angle</text>

    <!-- Legend Box -->
    <rect x="50" y="330" width="180" height="100" fill="#f0f9ff" stroke="#2563eb" rx="5" />
    <text x="60" y="350" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2563eb">Interior
        Angle</text>
    <circle cx="60" cy="365" r="5" fill="none" stroke="#2563eb" stroke-width="2" />
    <text x="75" y="370" font-family="Arial, sans-serif" font-size="12">Inside the shape</text>

    <text x="60" y="395" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">Exterior
        Angle</text>
    <circle cx="60" cy="415" r="5" fill="none" stroke="#dc2626" stroke-width="2" />
    <text x="75" y="420" font-family="Arial, sans-serif" font-size="12">Outside (supplementary)</text>

</svg>