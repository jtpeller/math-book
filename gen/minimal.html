<!DOCTYPE html>
<html lang="$lang$">

<head>
    <!-- This script handles light/dark theming. -->
    <script>
        function updateTheme() {
            // Check if the user has a manually saved preference
            const savedTheme = localStorage.getItem('theme');

            if (savedTheme) {
                document.documentElement.setAttribute('data-bs-theme', savedTheme);
            } else {
                // Otherwise, follow the system preference
                const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                document.documentElement.setAttribute('data-bs-theme', systemTheme);
            }
        }

        // Run immediately
        updateTheme();

        // Listen for system changes (e.g., if their computer switches to night mode while they are reading)
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (!localStorage.getItem('theme')) {
                updateTheme();
            }
        });
    </script>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$title$</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="${prefix}math-config.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
    $if(math)$
    $math$
    $endif$

    $for(css)$
    <link rel="stylesheet" href="$css$">
    $endfor$
</head>

<body>
    <header class="sticky-top">
        $include-before$
    </header>

    <div class="markdown-body">
        $body$
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- This controls navbar linking. -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const projectName = window.location.pathname.split('/')[1];
            document.querySelectorAll('.navbar-nav a').forEach(link => {
                const href = link.getAttribute('href');
                if (href && href.startsWith('/') && !href.startsWith('/' + projectName)) {
                    link.setAttribute('href', '/' + projectName + href);
                }
            });
        });

        const currentPath = window.location.pathname;
            document.querySelectorAll('.nav-link').forEach(link => {
                if (link.href === window.location.href) {
                    link.classList.add('text-white', 'fw-bold');
                    link.style.borderLeft = "2px solid #0dcaf0";
                }
            });
    </script>

    <!-- This script controls Theme Toggling. -->
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        const setTheme = theme => {
            document.documentElement.setAttribute('data-bs-theme', theme);
            localStorage.setItem('theme', theme);
            // Update icon based on theme
            themeIcon.innerText = theme === 'dark' ? '🌙' : '☀️';
        };

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-bs-theme');
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        // Set initial icon on load
        themeIcon.innerText = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? '🌙' : '☀️';
    </script>

    <!-- This script controls search bar.. -->
    <script>
        document.getElementById('nav-search').addEventListener('input', function (e) {
            const term = e.target.value.toLowerCase();
            const navItems = document.querySelectorAll('#nav-list .nav-item');

            navItems.forEach(item => {
                // Get text from links and headers within this item
                const text = item.textContent.toLowerCase();

                if (text.includes(term)) {
                    item.classList.remove('d-none');
                    // Optional: If it's a Section, ensure its parent Unit/Chapter stays visible
                } else {
                    item.classList.add('d-none');
                }
            });
        });
    </script>

</body>

</html>
