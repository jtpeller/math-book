{{ define "main" }}
<div class="py-4 mb-5 border-bottom">
    <h1 class="display-4 fw-bold">{{ .Title }}</h1>
    <p class="lead text-secondary">Browse content by {{ .Type | singularize }}.</p>
</div>

<div class="row row-cols-1 row-cols-md-3 g-3 mb-5">
    {{ range .Data.Terms.ByCount }}
    <div class="col">
        <a href="{{ .Page.RelPermalink }}" class="text-decoration-none">
            <div class="card h-100 shadow-sm border-info hover-shadow">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0 text-dark">{{ .Page.Title }}</h5>
                    <span class="badge rounded-pill bg-info text-white">
                        {{ .Count }}
                    </span>
                </div>
            </div>
        </a>
    </div>
    {{ end }}
</div>
{{ end }}
