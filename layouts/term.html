{{ define "main" }}
<div class="py-4 mb-5 border-bottom">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ site.Home.RelPermalink }}" class="text-decoration-none text-info">Home</a></li>
            <li class="breadcrumb-item"><a href="{{ .Parent.RelPermalink }}" class="text-decoration-none text-info">{{ .Parent.Title }}</a></li>
            <li class="breadcrumb-item active" aria-current="page">{{ .Title }}</li>
        </ol>
    </nav>
    <h1 class="display-4 fw-bold text-capitalize">{{ .Title }}</h1>
    <p class="lead text-secondary">All sections categorized under <strong>{{ .Title }}</strong>.</p>
</div>

<div class="row row-cols-1 g-3 mb-5">
    {{ range .Pages }}
        {{ $child := partial "get-info.html" . }}
        <div class="col">
            <a href="{{ .RelPermalink }}" class="text-decoration-none">
                <div class="card h-100 shadow-sm border-start border-info border-4">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0 text-dark">
                            <span class="text-info fw-bold me-2">{{ $child.Num }}.</span> {{ $child.Title }}
                        </h5>
                        <span class="text-muted small">{{ .Parent.Title }}</span>
                    </div>
                </div>
            </a>
        </div>
    {{ end }}
</div>
{{ end }}
